<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <link href="https://cdn.jsdelivr.net" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
    <title>Frontend Mentor | QR code component</title>
    <style>
        .attribution {
            font-size: 11px;
            text-align: center;
        }

        .attribution a {
            color: hsl(228, 45%, 44%);
        }
    </style>
</head>

<body>
    <div style="grid-template-columns: 1fr 2fr 0fr 0fr;" class="d-grid gap-3 ms-5 ps-5 my-5 py-5">
        <div class="my-0">
            <div class="position-relative  mt-0">
                <div class="rounded-edge position-absolute top-5 end-50 bottom-0 left-50 ps-5 z-1"></div>
                <div class="iphone-container position-relative top-0 end-0 left-50 ps-0 z-2">
                    <div class="phone-frame">
                        <div class=" screen-area">
                            <div class="enterMessage position-relative ">
                                <textarea class="form-control" id="exampleTextarea" rows="1"
                                    placeholder="Type a message"></textarea>
                                <div class="arrow-container">
                                    <i class="arrow right"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="my-5">
            <div class="position-relative z-0">
                <div class="position-absolute ms-5 top-50 right-100 z-1">
                    <h3>Simple Looking</h3>
                    <p>
                        <small class="text-body-tertiary">Stay in touch with our dog walkers through the chat interface.
                            This makes
                            it easy to discuss arrangements and make bookings. Once the walk has been
                            completed you can rate your walker book again all through the chat
                        </small>
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
